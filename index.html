<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Aritmética</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            width: 100%;
        }

        .calculator-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
        }

        .calculator-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .calculator-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .calculator-header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #4a9db5;
            box-shadow: 0 0 0 3px rgba(74, 157, 181, 0.1);
        }

        .operations-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .operation-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .operation-row:nth-child(3) {
            grid-column: 1 / -1;
        }

        .result-section {
            background: #e8f4f8;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #1a5f7a;
            border: 2px solid #b8dae8;
        }

        .result-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 40px;
            font-weight: bold;
            word-break: break-all;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }

        .info-message {
            background: #f0f8fb;
            color: #4a7c8e;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
            border-left: 4px solid #4a9db5;
        }

        @media (max-width: 600px) {
            .calculator-container {
                padding: 25px;
            }

            .calculator-header h1 {
                font-size: 24px;
            }

            .result-value {
                font-size: 32px;
            }

            .operations-grid {
                grid-template-columns: 1fr;
            }

            .operation-row:nth-child(3) {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
